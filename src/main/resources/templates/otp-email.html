<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
        }
        .otp-box {
            background-color: #f8f9fa;
            border: 2px dashed #3498db;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #3498db;
            margin: 20px 0;
            border-radius: 8px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #95a5a6;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Verify Your Account</h2>
        <p>Hello,</p>
        <p>Your One-Time Password (OTP) for account verification is:</p>
        <div class="otp-box" th:text="${otp}">123456</div>
        <p>This OTP will expire in 5 minutes. If you did not request this, please ignore this email.</p>
        <div class="footer">
            &copy; 2026 Java React Auth. All rights reserved.
        </div>
    </div>
</body>
</html>
