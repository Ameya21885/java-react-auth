# Profile Selection (Defaults to 'dev')
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Twilio (WhatsApp). Without SID/token, phone OTP will not send (see server logs / API message).
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
# Sandbox sender (https://console.twilio.com/us1/develop/sms/try-it-out/whatsapp-learn). Production: your approved WhatsApp sender.
twilio.whatsapp.from=+14155238886
# Optional: Twilio Content API template SID. If unset, a plain "Your OTP is …" body is sent (session/sandbox rules still apply).
twilio.whatsapp.content-sid=${TWILIO_WHATSAPP_CONTENT_SID:}

# Mail (Gmail needs an App Password on the Google account, not the normal login password).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ameyathakur21@gmail.com
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 spring.jpa.open-in-view=false
