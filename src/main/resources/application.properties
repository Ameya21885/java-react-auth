# Profile Selection (Defaults to 'dev')
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Twilio — phone OTP (see also https://www.twilio.com/docs/whatsapp/sandbox )
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
# WhatsApp "from" (sandbox: +14155238886; recipient must WhatsApp "join <code>" to that number first).
twilio.whatsapp.from=+14155238886
# WhatsApp OTP outside the 24h customer window needs an approved Content template SID (Twilio Console → Content).
twilio.whatsapp.content-sid=${TWILIO_WHATSAPP_CONTENT_SID:}
# Optional: your Twilio SMS number (E.164). If set, OTP is sent as SMS (reliable); if unset, only WhatsApp is used.
twilio.sms.from=${TWILIO_SMS_FROM:}

# Mail (Gmail: use an App Password, not your normal login password).
# Set any one of these in Railway: MAIL_PASSWORD, SPRING_MAIL_PASSWORD, or GMAIL_APP_PASSWORD.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:ameyathakur21@gmail.com}
spring.mail.password=${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:${GMAIL_APP_PASSWORD:}}}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 spring.jpa.open-in-view=false
